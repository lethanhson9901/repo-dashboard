name: Update and Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'src/data/repos.json'
      - 'src/data/reddit/**'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  workflow_run:
    workflows:
      - Update Reddit Data
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  fetch-github:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt1-dev
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Fetch GitHub stars
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PAT: ${{ secrets.GH_PAT }}
          OUTPUT_FILE: src/data/repos.json
          GITHUB_API_VERSION: 2022-11-28
          ITEMS_PER_PAGE: 100
        run: |
          mkdir -p src/data
          python backend/pull_your_star_repos.py
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add src/data/repos.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "[ci run]: Update data" && git push origin main)

  build:
    needs: [fetch-github]
    if: |
      always() &&
      (needs.fetch-github.result == 'success' || needs.fetch-github.result == 'skipped') &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
